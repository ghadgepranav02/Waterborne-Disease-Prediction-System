{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Waterborne Disease Prediction{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    <style>
        /* Fullscreen water-themed background */
        body {
            background: url('') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .navbar {
            background-color: rgba(13, 110, 253, 0.9) !important;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.3rem;
        }

        footer {
            background-color: rgba(13, 110, 253, 0.9);
        }

        .content-overlay {
            padding: 4rem 1rem;
            text-align: center;
        }

        .content-overlay h1, .content-overlay h2, .content-overlay p {
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.7);
        }

        .btn-primary {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">💧 Waterborne Disease Prediction</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <!-- Add nav links here if needed -->
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="container content-overlay" style="color: white;">
        {% block content %}{% endblock %}
    </div>

    <!-- Footer -->
    <footer class="text-white text-center py-3">
        &copy; {{ now|date:"Y" }} Waterborne Disease Prediction
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
