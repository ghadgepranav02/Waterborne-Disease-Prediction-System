{% extends "prediction/base.html" %}
{% block title %}Disease Prediction{% endblock %}
{% block content %}
<div class="container mt-3">
  <h2 class="text-center text-primary mb-4">🧪 Enter Water Quality Data</h2>
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-lg p-4" style="border-radius: 1rem;">
        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">pH Level</label>
            <input type="number" step="0.01" name="ph_level" class="form-control" required value="{{ ph_level }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Turbidity (NTU)</label>
            <input type="number" step="0.01" name="turbidity" class="form-control" required value="{{ turbidity }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Chlorine Level (mg/L)</label>
            <input type="number" step="0.01" name="chlorine_level" class="form-control" required value="{{ chlorine_level }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Bacteria Count (CFU/mL)</label>
            <input type="number" name="bacteria_count" class="form-control" required value="{{ bacteria_count }}">
          </div>
          <button type="submit" class="btn btn-primary w-100">🔍 Predict</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
